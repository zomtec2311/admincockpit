name: Mirror to Forgejo & Create Test Release

on:
  push:
    branches:
      - main
    paths:
      - 'appinfo/info.xml' # Pipeline startet NUR, wenn die info.xml geändert wurde!

jobs:
  mirror_and_release:
    runs-on: ubuntu-latest
    steps:
      # 1. Code aus GitHub auschecken (jetzt vollständig, um den Shallow-Fehler zu umgehen)
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Holt die komplette Historie, damit Forgejo den Push akzeptiert

      # 2. Versions-Tag aus der info.xml extrahieren
      - name: Get Version from info.xml
        id: get_version
        run: |
          VERSION=$(grep -oP '(?<=<version>).*?(?=</version>)' appinfo/info.xml || echo "0.0.0")
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Gefundene App-Version: $VERSION"

      # 3. Prüfen, ob sich die Version im Vergleich zum letzten Commit WIRKLICH geändert hat
      - name: Check if Version Changed
        id: check_version
        run: |
          # Wenn git show fehlschlägt (weil es z.B. der erste Commit ist), bleibt OLD_VERSION einfach leer
          OLD_XML=$(git show HEAD~1:appinfo/info.xml 2>/dev/null || echo "")

          if [ -z "$OLD_XML" ]; then
            echo "Keine vorherige info.xml gefunden. Erste Version wird verarbeitet."
            OLD_VERSION="0.0.0"
          else
            OLD_VERSION=$(echo "$OLD_XML" | grep -oP '(?<=<version>).*?(?=</version>)' || echo "0.0.0")
          fi

          echo "Alte Version: $OLD_VERSION"
          echo "Neue Version: ${{ env.VERSION }}"

          if [ "${{ env.VERSION }}" = "$OLD_VERSION" ]; then
            echo "Version hat sich nicht geändert. Breche Pipeline sauber ab."
            # Benutze exit 0 statt 1, damit GitHub den Durchlauf als erfolgreich (grün) markiert, aber nichts tut
            exit 0
          fi
          echo "Version erhöht! Fahre fort..."

      # 4. Code spiegeln UND das ECHTE Git-Tag in einem Rutsch pushen
      - name: Push Code and Tag to Forgejo Mirror
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"

          # Das exakte Test-Tag-Format generieren (z.B. v1.5.6-test.5)
          TAG_NAME="v${{ env.VERSION }}-test.${{ github.run_number }}"

          # Tag lokal setzen
          git tag $TAG_NAME

          # Remote hinzufügen
          git remote add forgejo https://${{ secrets.FORGEJO_TOKEN }}@git.24wt.de/zomtec2311/${{ github.event.repository.name }}.git

          # HEAD:main UND das Tag gleichzeitig pushen (das erzwingt das Tag-Push-Event!)
          git push -f forgejo HEAD:main $TAG_NAME
